apiVersion: v1
kind: Namespace
metadata:
  name: nfsz-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfsz-backing
  namespace: nfsz-system
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nfsz-ganesha-conf
  namespace: nfsz-system
data:
  ganesha.conf: |
    NFS_CORE_PARAM {
        NFS_Port = 2049;
        Protocols = 4;
        Enable_NLM = false;
        Enable_RQUOTA = false;
        mount_path_pseudo = true;
    }

    NFSV4 {
        Minor_Versions = 1, 2;
        Grace_Period = 15;
        Lease_Lifetime = 15;
        RecoveryBackend = fs;
    }

    EXPORT {
        Export_Id = 1;
        Path = /export;
        Pseudo = /;
        Protocols = 4;
        Transports = TCP;
        Access_Type = RW;
        Squash = No_Root_Squash;
        SecType = sys;
        Disable_ACL = true;
        FSAL { Name = VFS; }
    }

    LOG { Default_Log_Level = EVENT; }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfsz-server
  namespace: nfsz-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nfsz-server
  template:
    metadata:
      labels:
        app: nfsz-server
    spec:
      initContainers:
        - name: init-perms
          image: nfsz/ganesha:dev
          command: ["sh", "-c", "chmod 1777 /export && mkdir -p /var/lib/nfs/ganesha"]
          volumeMounts:
            - name: backing
              subPath: data
              mountPath: /export
            - name: backing
              subPath: .ganesha
              mountPath: /var/lib/nfs/ganesha
      containers:
        - name: ganesha
          image: nfsz/ganesha:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2049
              name: nfs
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: [DAC_READ_SEARCH, SYS_RESOURCE]
          readinessProbe:
            tcpSocket:
              port: 2049
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: conf
              mountPath: /etc/ganesha
            - name: backing
              subPath: data
              mountPath: /export
            - name: backing
              subPath: .ganesha
              mountPath: /var/lib/nfs/ganesha
      volumes:
        - name: conf
          configMap:
            name: nfsz-ganesha-conf
        - name: backing
          persistentVolumeClaim:
            claimName: nfsz-backing
---
apiVersion: v1
kind: Service
metadata:
  name: nfsz-server
  namespace: nfsz-system
spec:
  selector:
    app: nfsz-server
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049
      protocol: TCP
