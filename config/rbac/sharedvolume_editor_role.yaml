# This rule is not used by the project nfsz itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the nfsz.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: nfsz
    app.kubernetes.io/managed-by: kustomize
  name: sharedvolume-editor-role
rules:
- apiGroups:
  - nfsz.dev
  resources:
  - sharedvolumes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - nfsz.dev
  resources:
  - sharedvolumes/status
  verbs:
  - get
