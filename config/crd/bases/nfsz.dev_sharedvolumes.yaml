    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SharedVolume is a cluster-scoped RWX volume shared across namespaces,
          served by an operator-managed in-cluster NFSv4 server.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of SharedVolume
            properties:
              backup:
                description: |-
                  backup configures a scheduled mirror of this volume's data to a
                  destination that survives the cluster, plus auto-seeding of fresh
                  volumes from that mirror.
                properties:
                  destination:
                    description: destination is where backups are written.
                    properties:
                      hostPath:
                        description: hostPath writes backups to a node-local directory.
                        properties:
                          path:
                            description: |-
                              path is an absolute directory on the node. Data is mirrored to
                              <path>/<sharedvolume-name>/.
