                      backup at the destination.
                    enum:
                    - Auto
                    - Never
                    type: string
                  schedule:
                    description: |-
                      schedule is a standard cron expression, evaluated by the CronJob
                      controller in the cluster's time zone.
                    minLength: 1
                    type: string
                  suspend:
                    description: suspend pauses scheduled backups without deleting
                      the CronJob.
                    type: boolean
                required:
                - destination
                - schedule
                type: object
              capacity:
                anyOf:
                - type: integer
                - type: string
                description: capacity is the size of the shared volume. Immutable.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
