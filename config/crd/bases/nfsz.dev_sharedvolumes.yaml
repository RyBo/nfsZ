                    type: array
                  selector:
                    description: selector selects namespaces by label.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
              networkPolicy:
                default: Enabled
                description: |-
                  networkPolicy controls the per-volume NetworkPolicy that restricts
                  NFS access to cluster nodes and target namespaces.
                enum:
                - Enabled
                - Disabled
                type: string
              reclaimPolicy:
                default: Delete
                description: reclaimPolicy controls the fate of the backing PVC on
                  deletion.
                enum:
                - Delete
                - Retain
                type: string
              storageClassName:
                description: |-
                  storageClassName is the StorageClass used for the backing PVC.
                  Unset means the cluster default StorageClass.
                type: string
            required:
            - capacity
            - namespaces
            type: object
          status:
            description: status defines the observed state of SharedVolume
            properties:
              backingPVC:
                description: backingPVC is "namespace/name" of the PVC storing the
                  data.
                type: string
              bindings:
                description: bindings lists per-namespace PVC states.
                items:
                  description: NamespaceBinding reports the PVC state in one target
                    namespace.
                  properties:
                    namespace:
                      type: string
                    phase:
                      description: BindingPhase describes the state of one namespace's
                        PVC binding.
                      type: string
                    pvcName:
                      type: string
                  required:
                  - namespace
                  - phase
                  - pvcName
                  type: object
                type: array
              boundSummary:
                description: boundSummary is "<bound>/<total>" across target namespaces.
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
